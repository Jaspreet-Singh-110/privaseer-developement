<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Email Form Test Page</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 32px;
      }

      main {
        max-width: 420px;
      }

      label,
      input,
      button {
        display: block;
        width: 100%;
      }

      input {
        margin-top: 8px;
        margin-bottom: 12px;
        padding: 10px;
      }

      button {
        padding: 10px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Burner Email Test Form</h1>
      <p>Focus the email field to trigger content-script autofill UI.</p>
      <form>
        <label for="user-email">Email Address</label>
        <input type="email" id="user-email" name="email" placeholder="Enter your email" />
        <button type="submit">Sign Up</button>
      </form>
    </main>
  </body>
</html>
