name: Keep Supabase Active

on:
  schedule:
    - cron: '0 12 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    name: Ping Supabase Project
    runs-on: ubuntu-latest

    steps:
      - name: Send keep-alive request
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://llffqxdhpgsqnpzeznaq.supabase.co/health)

          echo "Response status: $STATUS"

          if [ "$STATUS" -eq 200 ] || [ "$STATUS" -eq 401 ]; then
            echo "✅ Supabase is alive and responding!"
          else
            echo "❌ Project may be down or paused. Status: $STATUS"
            exit 1
          fi